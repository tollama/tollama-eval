apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tollama-eval.fullname" . }}
  labels:
    {{- include "tollama-eval.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tollama-eval.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tollama-eval.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tollama-eval"]
          args:
            - serve
            - "--port"
            - "{{ .Values.server.port }}"
            - "--host"
            - "0.0.0.0"
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: TOLLAMA_AUTH_MODE
              value: "{{ .Values.auth.mode }}"
            - name: TOLLAMA_MAX_CONCURRENT_JOBS
              value: "{{ .Values.server.maxConcurrentJobs }}"
            {{- if .Values.auth.oidcIssuerUrl }}
            - name: TOLLAMA_OIDC_ISSUER_URL
              value: "{{ .Values.auth.oidcIssuerUrl }}"
            {{- end }}
            {{- if .Values.auth.apiKeySecret }}
            - name: TOLLAMA_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.apiKeySecret }}
                  key: api-keys
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/out
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tollama-eval.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
