[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ts-autopilot"
version = "0.1.0"
description = "Automated time series benchmarking"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pandas>=2.0,<3",
    "numpy>=1.24,<3",
    "statsforecast>=1.7,<2",
    "typer>=0.9,<1",
    "jinja2>=3.1,<4",
    "httpx>=0.25,<1",
    "pyyaml>=6.0,<7",
]

[project.scripts]
ts-autopilot = "ts_autopilot.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ts_autopilot"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.ruff]
line-length = 88
target-version = "py310"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
]
